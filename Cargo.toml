required-features = ["serialize", "deserialize"]

[[example]]
name = "pirate_formatter"
required-features = ["serialize", "deserialize"]

[[example]]
name = "polymorphism_tree_planting_robot"
required-features = ["serialize", "deserialize"]

[[example]]
name = "polymorphism_tree_planting_robot_tuples"
required-features = ["serialize", "deserialize"]

[[example]]
name = "print_transform"
required-features = ["serialize"]

[[example]]
name = "recursive_yaml"
required-features = ["serialize", "deserialize"]

[[example]]
name = "render_with_snippet"
required-features = ["serialize", "deserialize"]

[[example]]
name = "serde_ignored"
required-features = ["serialize", "deserialize"]

[[example]]
name = "serde_path_to_error"
required-features = ["serialize", "deserialize"]

[[example]]
name = "spaced_yaml"
required-features = ["serialize", "deserialize"]

[[example]]
