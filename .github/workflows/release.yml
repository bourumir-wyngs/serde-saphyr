name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt
          rustc -V
          cargo -V

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"

          if [ -z "${package_version}" ]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi

          if [ "${GITHUB_REF}" != "refs/tags/${package_version}" ]; then
            echo "Ref ${GITHUB_REF} does not match Cargo.toml version ${package_version}. Run workflow manually from tag!" >&2
            echo "Run this workflow from tag ${package_version}." >&2
            exit 1
          fi

      - name: Prefetch deps
        run: |
          cargo fetch 
          cargo fetch  --manifest-path fuzz/Cargo.toml

      - name: Check formatting (crate)
        run: |
          cargo fmt --all -- --check

      - name: Check formatting (fuzz)
        run: |
          cargo fmt --manifest-path fuzz/Cargo.toml --all -- --check

      - name: Run clippy (crate)
        run: |
          cargo clippy  --offline --all-targets --all-features -- -D warnings

      - name: Run clippy (fuzz)
        run: |
          cargo clippy  --offline --manifest-path fuzz/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run tests (default)
        run: |
          cargo test  --offline

      - name: Run tests with miette feature only
        run: |
          cargo test  --offline --features miette

      - name: Run tests with robotics feature set
        run: |
          cargo test  --offline --features garde,validator,miette,figment,robotics

      - name: Run tests with explicit core features
        run: |
          cargo test  --offline --no-default-features --features serialize,deserialize

      - name: Run tests with huge_documents
        run: |
          cargo test  --offline --features huge_documents

      - name: Verify crate packaging
        run: |
          cargo publish  --dry-run

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    environment: publish

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -V
          cargo -V

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish 