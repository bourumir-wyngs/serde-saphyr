name: Rust

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy
          rustc -V
          cargo -V

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Prefetch deps
        run: |
          cargo fetch --locked
          cargo fetch --locked --manifest-path fuzz/Cargo.toml

      - name: Run clippy (crate)
        run: |
          cargo clippy --locked --offline --all-targets --all-features -- -D warnings

      - name: Run clippy (fuzz)
        run: |
          cargo clippy --locked --offline --manifest-path fuzz/Cargo.toml --all-targets --all-features -- -D warnings

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pick toolchain BEFORE rust-cache (cache key includes rustc version).
      - name: Install Rust toolchain
        run: |       
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -V
          cargo -V

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # Prefetch once (for BOTH feature sets), then run offline to avoid a second network touch.
      - name: Prefetch deps (both feature sets)
        run: |         
          cargo fetch --locked

      - name: Run tests (default)
        run: |        
          cargo test --locked --offline

      - name: Run tests with miette feature only
        run: |       
          cargo test --locked --offline --features miette

      - name: Run tests with robotics feature set
        run: |
          cargo test --locked --offline --features garde,validator,miette,figment,robotics

      - name: Run no default features
        run: |
          cargo test --locked --offline --no-default-features --features serialize,deserialize

      - name: Run large huge_documents
        run: |
          cargo test --locked --offline --features huge_documents
          

  build_wasm32-unknown-unknown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain and wasm32-unknown-unknown target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustc -V
          cargo -V

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check build for wasm32-unknown-unknown
        run: |
          cargo check --target wasm32-unknown-unknown --locked

  build_wasm32-wasip1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain and wasm32-wasip1 target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-wasip1
          rustc -V
          cargo -V

      - name: Install wasmtime
        run: |
          cargo install wasmtime-cli --locked
          wasmtime --version

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests for wasm32-wasip1
        run: |
          cargo test --target wasm32-wasip1 --locked

  build_os_compat:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -V
          cargo -V
        shell: bash

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests (all features)
        run: cargo test --locked --all-features

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: |
          cargo install cargo-llvm-cov --locked

      - name: Generate code coverage
        run: |
          cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: bourumir-wyngs/serde-saphyr
          files: lcov.info
          fail_ci_if_error: true
